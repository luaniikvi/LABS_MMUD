# Nginx TLS Configuration - ECDSA Certificate
# Lab 4 - PKI Deployment Task
# Requires: certs/server_cert.pem, certs/server_key.pem, certs/ca_cert.pem

server {
    listen 443 ssl;
    server_name localhost;

    # ECDSA Certificate Chain
    ssl_certificate         /etc/nginx/certs/server_cert.pem;
    ssl_certificate_key     /etc/nginx/certs/server_key.pem;
    ssl_trusted_certificate /etc/nginx/certs/ca_cert.pem;

    # TLS 1.3 only (recommended) or TLS 1.2+
    ssl_protocols TLSv1.3 TLSv1.2;

    # Modern cipher suites (prefer ECDSA ciphers)
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;

    # HSTS (6 months)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # OCSP Stapling (if using real CA)
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # Session settings
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    location / {
        root /var/www/html;
        index index.html;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}
