# Apache TLS Configuration - ECDSA Certificate
# Lab 4 - PKI Deployment Task
# Requires: certs/server_cert.pem, certs/server_key.pem, certs/ca_cert.pem
# Enable modules: a2enmod ssl headers

<VirtualHost *:443>
    ServerName localhost
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile      /etc/apache2/certs/server_cert.pem
    SSLCertificateKeyFile   /etc/apache2/certs/server_key.pem
    SSLCACertificateFile    /etc/apache2/certs/ca_cert.pem

    # TLS 1.2 and 1.3 only
    SSLProtocol -all +TLSv1.2 +TLSv1.3

    # Modern ECDSA cipher suites
    SSLCipherSuite ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256
    SSLHonorCipherOrder on

    # HSTS (6 months)
    Header always set Strict-Transport-Security "max-age=15768000; includeSubDomains"

    # Security headers
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options DENY
</VirtualHost>

# Redirect HTTP to HTTPS
<VirtualHost *:80>
    ServerName localhost
    Redirect permanent / https://localhost/
</VirtualHost>
